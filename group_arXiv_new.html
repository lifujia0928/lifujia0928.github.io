
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>arxiv</title>
        <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>

    </head>
<body>
<div  id='root'>
    <div id='mingdan'>
        <p class='subtitle'>  arxiv名单</p>
        <div v-for='(item,index) of arxiv' :key='index' class='item-list'>
             <div  class='input' >{{item.name}} </div>
             <input v-model.number='item.weight' class='input'  type="number" > </input> 
             <button @click='delPerson(item.name)' class='bottom-x'>X</button>   
        </div>
        <HR>
        <div class='item-list'>
            <input v-model='addname.name' class='input'> </input> 
            <input v-model.number='addname.weight' class='input'  type="number" > </input> 
            <button @click='addPerson(addname.name,addname.weight)'>添加</button>
        </div>
        <div class='item-list'>
            <button @click='add1'>全体加1</button>
            <button @click='output'>导出</button>            
        </div>   
        <div class='item-list' >
            <input  id='testing-code' type='hidden' :value="outputtext"></input>
        </div> 
    </div>
    <div id='random-area'>    
        <div class='bottom-start-area'>
            <button @click="start" class='bottom-start' >{{button1}}</button>
            <button @click="confirm" class='bottom-start'>确认</button>
        </div>
        <div class='random'>
            <div  v-for='(item,index) of arxiv' :key='index' :class="[whichSelected==item.name?'select':'noselect'] + ' item-sqrure' " >
            {{item.name}}  x {{item.weight}} 
            </div>
        </div>
    </div>
    <div id='jinrimingdan'>
        <div v-if="selectedList.length > 0 "><p>今日名单 {{selectedList.length}}</p></div>
        <li v-for="item in selectedList">{{item}}</li>
    </div>
</div>
</body>

<script type='text/javascript'>
    // Vue.config.productionTip = false
    var vm = new Vue({
        el:'#root',
        data:{
            arxiv:[
            {"name":"林泽森","weight":1},{"name":"刘海洋","weight":22},{"name":"陈新凯","weight":7},{"name":"陈广文","weight":6},{"name":"姚遥","weight":5},{"name":"陈李俊","weight":2},{"name":"李孚嘉","weight":3},{"name":"陶柏钧","weight":10},{"name":"罗毅彬","weight":9}
            ],
            addname:{
                name:'xx', weight:'1'
            },
            whichSelected:'',
            button1:'开始',
            selectedList:[],
            outputtext:''
        },
        methods:{
            delPerson(name){
                console.log(name);
                var b = []
                this.arxiv = this.arxiv.filter((p)=>{
                    return p.name != name
                })
                console.log(b)
            },
            addPerson(name,weight){
                if(this.arxiv.some(e => e.name == name)) {
                    console.log('Exists');
                    return
                }
                console.log('addPerson'+ name+weight)
                weight = parseInt(weight)
                const p = {name:name, weight:weight}
                this.arxiv.push(p)
            },
            start(){
                if (this.button1 =='开始'){
                console.log('@@@ 开始')

                this.button1 = '停止'
                var nameList = this.arxiv.map(o=>o.name)
                var weightList = this.arxiv.map(o=>o.weight)
                console.log(weightList)
                var i
                for (i = 0; i < weightList.length; i++)
                    weightList[i] += weightList[i - 1] || 0;                
                var that = this
                function choujiang(){
                    var random = Math.random() * weightList[weightList.length - 1];               
                    for (i = 0; i < weightList.length; i++)
                        if (weightList[i] > random)
                            break;
                    that.whichSelected = nameList[i]
                    console.log(nameList[i])
                    timeID = setTimeout(choujiang, 50);
                    //that.selectedList.push(that.whichSelected)
                }
                choujiang()
                }
                else {
                    this.button1 ='开始'
                    clearInterval(timeID)
                }

            },
            confirm(){
                if (this.button1 =='开始'){
                for (let i = 0; i < this.arxiv.length; i++)
                {
                    if (this.arxiv[i].name == this.whichSelected)
                        this.arxiv[i].weight = 1
                    else this.arxiv[i].weight +=1
                }
                this.selectedList.push(this.whichSelected)
                }
            },
            add1(){
            for (let i = 0; i < this.arxiv.length; i++)
                {
                    this.arxiv[i].weight +=1
                }

            },
            output: async function(){
                var output1 = this.arxiv.map(entry => JSON.stringify(entry)).join(",\n");
                this.outputtext = output1 

                await this.$forceUpdate()
                let testingCodeToCopy = document.querySelector('#testing-code')
                //testingCodeToCopy.setAttribute('type', "text")
               
                testingCodeToCopy.setAttribute('type', "text")
                testingCodeToCopy.select()
                console.log(testingCodeToCopy.textContent)
                document.execCommand("copy");
                testingCodeToCopy.setAttribute('type', 'hidden')
                window.getSelection().removeAllRanges()
                alert('copyed')
            }
            
        }
    })



</script>
